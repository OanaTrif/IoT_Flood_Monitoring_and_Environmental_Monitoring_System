<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Panou Control Cloud IoT</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; margin-top: 30px; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; min-width: 450px; text-align: left; }
        .box { background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; color: white; margin-right: 5px; }
        .btn-on { background: #28a745; }
        .btn-off { background: #dc3545; }
        .btn-send { background: #007bff; }
        .btn-del { background: #6c757d; padding: 2px 10px; font-size: 12px; cursor: pointer;}
        .alert { background: #dc3545; color: white; padding: 10px; border-radius: 5px; display: none; font-weight: bold; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem IoT - Monitorizare de la Distanță</h2>
    
    <div id="alerta_inundatie" class="alert">ALERTA: INUNDATIE DETECTATA!</div>

    <div class="box">
        <h3>Date Senzori:</h3>
        <p>Temperatura: <strong id="t">--</strong> °C</p>
        <p>Umiditate: <strong id="u">--</strong> %</p>
        <p>Nivel Apa: <strong id="a">--</strong></p>
    </div>

    <div class="box">
        <h3>Control LED:</h3>
        <button class="btn-on" onclick="led('A')">Aprinde</button>
        <button class="btn-off" onclick="led('S')">Stinge</button>
    </div>

    <div class="box">
        <h3>Trimite Mesaj la Microcontroller (EEPROM):</h3>
        <input type="text" id="msg_text" placeholder="Maxim 18 caractere..." maxlength="18" style="padding: 8px; width: 200px;">
        <button class="btn-send" onclick="trimiteMesaj()">Trimite</button>
    </div>

    <div class="box">
        <h3>Istoric Ultimele 10 Inundații:</h3>
        <ul id="lista_inundatii">
            {% for i in inundatii %}
                <li>{{ i }} <button class="btn-del" onclick="stergeEveniment({{ loop.index0 }})">Sterge</button></li>
            {% endfor %}
        </ul>
    </div>
</div>

<script>
    setInterval(function() {
        fetch('/date-senzor')
        .then(r => r.json())
        .then(data => {
            document.getElementById('t').innerText = data.temperatura;
            document.getElementById('u').innerText = data.umiditate;
            document.getElementById('a').innerText = data.nivel_apa;
            if(parseInt(data.nivel_apa) > 100) {
                document.getElementById('alerta_inundatie').style.display = 'block';
            } else {
                document.getElementById('alerta_inundatie').style.display = 'none';
            }
        });
    }, 2000);

    function led(stare) {
        fetch('/comanda-led', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({comanda: stare}) });
    }

    function trimiteMesaj() {
        let txt = document.getElementById('msg_text').value;
        if(!txt) return;
        fetch('/trimite-mesaj', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({mesaj: txt}) })
        .then(() => { location.reload(); });
    }

    function stergeEveniment(index) {
        fetch('/sterge-eveniment', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({index: index}) })
        .then(() => { location.reload(); });
    }
</script>

</body>
</html>
